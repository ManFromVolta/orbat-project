<!DOCTYPE html>
<html lang="ru">
<head>

<title>ORBAT — Языки</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;background:#1a1a18;color:#d4d2cc;min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;background:#1a1a18;border-bottom:0.5px solid #333;padding:6px 16px;display:flex;align-items:center;gap:12px;z-index:1000}
.nav a{text-decoration:none;color:#888;font-size:10px;padding:3px 10px;border:0.5px solid #444;border-radius:3px;background:#2c2c2a;transition:all 0.15s}
.nav a:hover{color:#f1efe8;border-color:#888}
.nav span{color:#555;font-size:10px}
.spacer{height:28px}
.layout{display:flex;min-height:calc(100vh - 28px)}
.sidebar{width:190px;min-width:190px;background:#242422;border-right:0.5px solid #2a2a28;overflow-y:auto;position:sticky;top:28px;height:calc(100vh - 28px)}
.sb-section{padding:10px 14px 4px;font-size:9px;color:#444;text-transform:uppercase;letter-spacing:0.08em}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:10px;color:#666;cursor:pointer;border-left:2px solid transparent;transition:all 0.1s}
.sb-item:hover{color:#d4d2cc;background:#2c2c2a}
.sb-item.active{color:#f1efe8;border-left-color:#c87840}
.sb-item .dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}
.sb-item.dead{opacity:0.45}
.main{flex:1;overflow-y:auto;padding:24px 28px;max-width:900px}
.lang-header{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.lang-header h2{font-size:16px;font-weight:500;color:#f1efe8}
.dead-badge{font-size:9px;padding:2px 8px;border-radius:3px;border:0.5px solid #444;color:#555;background:#1a1a18}
.subtitle{font-size:10px;color:#555;margin-bottom:20px;font-style:italic}
.section{margin-bottom:22px}
.section h3{font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;padding-bottom:5px;border-bottom:0.5px solid #242422}
p{font-size:11px;color:#888;line-height:1.7;margin-bottom:8px}
.ph-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.ph{background:#242422;border:0.5px solid #2a2a28;border-radius:3px;padding:2px 7px;font-family:monospace;font-size:10px;color:#c87840}
.ph.absent{color:#444;text-decoration:line-through;background:#1a1a18}
.wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.wcard{background:#242422;border:0.5px solid #2a2a28;border-radius:3px;padding:6px 8px}
.wcard .w{font-family:monospace;font-size:11px;color:#f1efe8;margin-bottom:2px}
.wcard .m{font-size:9px;color:#555}
.rule{display:flex;gap:8px;margin-bottom:5px;font-size:10px}
.rule .rl{color:#555;min-width:150px;flex-shrink:0}
.rule .rv{color:#aaa}
.ex{background:#242422;border-left:2px solid #333;padding:7px 10px;margin:5px 0;font-family:monospace;font-size:10px;color:#888;border-radius:0 3px 3px 0}
.ex .tr{color:#555;font-style:italic;margin-top:2px}
.nbblock{background:#1a1a18;border:0.5px solid #2a2a28;border-radius:4px;padding:12px 14px;margin-top:6px}
.nbparams{display:flex;gap:16px;margin-bottom:8px}
.nbparams span{font-size:10px;color:#666}
.nbparams b{color:#c87840}
.nbwords{font-family:monospace;font-size:9px;color:#555;line-height:1.8;word-break:break-all;cursor:pointer;border:0.5px dashed #242422;border-radius:3px;padding:8px;background:#242422;transition:all 0.15s}
.nbwords:hover{color:#d4d2cc;border-color:#444}
.hint{font-size:9px;color:#333;margin-top:4px}
</style>

function show(id){
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('sb-'+id).classList.add('active');
  const L=D[id];
  const fade=L.dead?'opacity:0.6':'';
  document.getElementById('main').innerHTML=`<div style="${fade}">
<div class="lang-header"><span style="display:inline-block;width:16px;height:16px;border-radius:3px;background:#${L.hex};border:0.5px solid rgba(255,255,255,0.1)"></span><h2>${L.name}</h2>${L.dead?'<span class="dead-badge">Мёртвый язык</span>':''}</div>
<p class="subtitle">${L.family} &nbsp;·&nbsp; ${L.period}</p>
<div class="section"><h3>Описание</h3><p>${L.desc}</p></div>
<div class="section"><h3>Фонетика</h3>
<p style="font-size:10px;color:#555;margin-bottom:5px">Присутствует:</p><div class="ph-wrap">${L.ph.y.map(p=>`<span class="ph">${p}</span>`).join('')}</div>
${L.ph.n.length?`<p style="font-size:10px;color:#555;margin:8px 0 5px">Отсутствует / исчезает:</p><div class="ph-wrap">${L.ph.n.map(p=>`<span class="ph absent">${p}</span>`).join('')}</div>`:''}
</div>
<div class="section"><h3>Словообразование</h3>${L.rules.map(r=>`<div class="rule"><span class="rl">${r[0]}</span><span class="rv">${r[1]}</span></div>`).join('')}</div>
<div class="section"><h3>Словарь</h3><div class="wgrid">${L.words.map(w=>`<div class="wcard"><div class="w">${w.w}</div><div class="m">${w.m}</div></div>`).join('')}</div></div>
${L.ex.length?`<div class="section"><h3>Примеры</h3>${L.ex.map(e=>`<div class="ex">${e.s}<div class="tr">${e.t}</div></div>`).join('')}</div>`:''}
<div class="section"><h3>Namesbase для Azgaar</h3><div class="nbblock">
<div class="nbparams"><span>Length: <b>${L.nb.l}</b></span><span>Doubled: <b>${L.nb.d||'пусто'}</b></span></div>
<div class="nbwords" id="nb-${id}" onclick="cp('${id}')">${L.nb.w}</div>
<div class="hint">Клик — скопировать всё</div>
</div></div></div>`;
}
function cp(id){
  const el=document.getElementById('nb-'+id);
  navigator.clipboard.writeText(D[id].nb.w).catch(()=>{});
  const orig=el.textContent;
  el.classList.add('copied');
  el.textContent='Скопировано';
  setTimeout(()=>{el.classList.remove('copied');el.textContent=orig;},1500);
}
show('ullam');
