<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBAT — Карта мира</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid #333;
        }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #e94560;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .map-container {
            background: #16213e;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }
        .map-container h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .map-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .map-info-item {
            background: #0f3460;
            padding: 15px;
            border-radius: 6px;
        }
        .map-info-item label {
            display: block;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .map-info-item span {
            font-size: 1rem;
            color: #eee;
        }
        .map-placeholder {
            background: #0f3460;
            height: 400px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1.2rem;
            border: 2px dashed #333;
        }
        .map-download {
            margin-top: 20px;
            padding: 12px 25px;
            background: #e94560;
            color: #eee;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .map-download:hover { background: #c73e54; }
        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .map-container { padding: 20px; }
            .map-placeholder { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Главная</a>
        
        <header>
            <h1>Карта Мира</h1>
            <p>Azgaar Fantasy Map Generator · Оррим</p>
        </header>

        <div class="map-container">
            <h2>Текущая версия (-100 000)</h2>
            
            <div class="map-info">
                <div class="map-info-item">
                    <label>Файл</label>
                    <span>Мир Full 2026-03-27-02-23.json</span>
                </div>
                <div class="map-info-item">
                    <label>Размер</label>
                    <span>1920 × 1006 px</span>
                </div>
                <div class="map-info-item">
                    <label>Масштаб</label>
                    <span>7680 × 4024 км</span>
                </div>
                <div class="map-info-item">
                    <label>Горы Запад</label>
                    <span>4500-6400м</span>
                </div>
                <div class="map-info-item">
                    <label>Горы Восток</label>
                    <span>8381м (max)</span>
                </div>
                <div class="map-info-item">
                    <label>Озеро</label>
                    <span>Ярви (север-центр)</span>
                </div>
            </div>

            <div class="map-placeholder">
                [Здесь будет PNG экспорт карты из Azgaar]
            </div>

            <a href="#" class="map-download">📥 Скачать JSON</a>
            <a href="#" class="map-download">📥 Скачать PNG</a>
        </div>

        <footer style="text-align: center; padding: 30px; border-top: 2px solid #333; color: #666; font-size: 0.85rem;">
            <p>ORBAT Worldbuilding Project · 2026</p>
        </footer>
    </div>
</body>
</html>
