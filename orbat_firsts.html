  {year:-19000, cat:"religion", title:"Первое жертвоприношение в воду",
   people:"Ярви", hex:"6A9FB0",
   desc:"Украшения, орудия и кости животных в прибрежных отложениях озера Яарви. Первые намеренные жертвоприношения водоёму. Традиция которая переживёт сам народ — болотные клады и речные клады во всех последующих культурах Оррима."},
];

// sort by year
ITEMS.sort(function(a,b){return a.year-b.year;});

const PEOPLE_HEX = {};
ITEMS.forEach(function(it){ PEOPLE_HEX[it.people] = it.hex; });

let activeCat = "all";

function formatYear(y) {
  if(y < 0) return "ок. " + Math.abs(y).toLocaleString() + " до н.э.";
  return "ок. " + y.toLocaleString() + " н.э.";
}

function catLabel(id) {
  return CATS.find(function(c){return c.id===id;}).label;
}
function catColor(id) {
  const c = CATS.find(function(c){return c.id===id;});
  return c && c.color ? c.color : "#888";
}

function renderControls() {
  const ctrl = document.getElementById("controls");
  let h = "";
  CATS.forEach(function(cat) {
    const count = cat.id === "all"
      ? ITEMS.length
      : ITEMS.filter(function(it){return it.cat===cat.id;}).length;
    const active = activeCat === cat.id;
    const dot = cat.color
      ? '<span class="cat-dot" style="background:' + cat.color + ';opacity:' + (active?1:0.5) + '"></span>'
      : "";
    h += '<button class="cat-btn' + (active?" active":"") + '" data-cat="' + cat.id + '">'
       + dot + cat.label
       + ' <span style="font-size:11px;color:' + (active?"#888":"#444") + '">(' + count + ')</span>'
       + '</button>';
  });
  h += '<span class="count" id="count"></span>';
  ctrl.innerHTML = h;
  ctrl.querySelectorAll(".cat-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      activeCat = this.dataset.cat;
      renderControls();
      renderList();
    });
  });
}

function renderList() {
  const list = document.getElementById("list");
  const visible = ITEMS.filter(function(it){
    return activeCat === "all" || it.cat === activeCat;
  });
  const countEl = document.getElementById("count");
  if(countEl) countEl.textContent = visible.length + " событий";

  if(visible.length === 0){
    list.innerHTML = '<div class="empty">Нет событий</div>';
    return;
  }

  list.innerHTML = visible.map(function(it){
    const cc = "cat-" + it.cat;
    return '<div class="item visible ' + cc + '">'
      + '<div class="item-date">' + formatYear(it.year) + '</div>'
      + '<div class="item-body">'
      + '<div class="item-title">'
      + it.title
      + '<span class="item-cat" style="background:' + catColor(it.cat) + '22;color:' + catColor(it.cat) + '">'
      + catLabel(it.cat) + '</span>'
      + '</div>'
      + '<div class="item-people">'
      + '<span class="swatch" style="background:#' + it.hex + '"></span>'
      + '<span style="color:#999;font-size:13px">' + it.people + '</span>'
      + '</div>'
      + '<div class="item-desc">' + it.desc + '</div>'
      + '</div></div>';
  }).join("");
}

renderControls();
renderList();
</script>
</body>
</html>
