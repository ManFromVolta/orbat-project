<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ORBAT — Живой Кодекс</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;background:#1a1a18;color:#d4d2cc;min-height:100vh}
.header{background:#2c2c2a;padding:16px 20px;border-bottom:1px solid #444}
.header h1{font-size:18px;font-weight:500;color:#f1efe8;letter-spacing:0.05em}
.header p{font-size:10px;color:#888;margin-top:4px}
.epoch-bar{display:flex;gap:6px;padding:12px 20px;background:#242422;border-bottom:1px solid #333;flex-wrap:wrap}
.epoch-btn{padding:4px 12px;border:0.5px solid #555;border-radius:4px;cursor:pointer;font-size:10px;background:#2c2c2a;color:#aaa;transition:all 0.15s}
.epoch-btn.active{background:#5f5e5a;color:#f1efe8;border-color:#888}
.epoch-btn:hover{border-color:#888;color:#ddd}
.content{padding:16px 20px}
.section-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 8px}
table{width:100%;border-collapse:collapse;margin-bottom:20px}
th{background:#2c2c2a;padding:6px 8px;text-align:left;font-size:10px;font-weight:500;color:#888;border-bottom:1px solid #444;white-space:nowrap}
td{padding:6px 8px;border-bottom:0.5px solid #333;font-size:10px;vertical-align:top}
tr:hover td{background:#242422}
.swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;border:0.5px solid rgba(255,255,255,0.15)}
.locked{color:#555;font-style:italic}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin:1px}
.tag-nomadic{background:#3a2a10;color:#c87840}
.tag-river{background:#102a2a;color:#40a0a0}
.tag-hunting{background:#2a1a2a;color:#a060a0}
.tag-naval{background:#0a1a2a;color:#4080c0}
.tag-generic{background:#2a2a1a;color:#a0a060}
.tag-locked{background:#222;color:#555}
.pop{color:#a0c880}
.exp-bar{display:inline-block;height:6px;background:#5f5e5a;border-radius:2px;vertical-align:middle;margin-right:4px}
.exp-fill{height:100%;border-radius:2px;background:#c87840}
.event-card{background:#242422;border:0.5px solid #333;border-left:3px solid #c87840;border-radius:4px;padding:10px 12px;margin-bottom:8px}
.event-card h4{font-size:11px;font-weight:500;color:#f1efe8;margin-bottom:4px}
.event-card p{font-size:10px;color:#888;line-height:1.6}
.climate-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.climate-card{background:#242422;border:0.5px solid #333;border-radius:4px;padding:8px 10px;text-align:center}
.climate-card .label{font-size:9px;color:#666;margin-bottom:2px}
.climate-card .value{font-size:14px;font-weight:500;color:#a0c880}
</style>
</head>
<body>
<div style="position:fixed;top:0;left:0;right:0;background:#1a1a18;border-bottom:0.5px solid #333;padding:6px 16px;display:flex;align-items:center;gap:12px;z-index:1000">
  <a href="index.html" style="text-decoration:none;color:#888;font-size:10px;padding:3px 10px;border:0.5px solid #444;border-radius:3px;background:#2c2c2a;transition:all 0.15s" onmouseover="this.style.color='#f1efe8';this.style.borderColor='#888'" onmouseout="this.style.color='#888';this.style.borderColor='#444'">← Главная</a>
  <span style="color:#333;font-size:10px" id="navTitle">Живой Кодекс</span>
</div>
<div style="height:28px"></div>
<div class="header">
  <h1>ORBAT — Живой Кодекс Мира</h1>
  <p>Доисторическая эра · Культуры · Климат · События</p>
</div>

<div class="epoch-bar" id="epochBar"></div>

<div class="content" id="content"></div>

<script>
const EPOCHS = [
  {

      {title:'Аммаи-куттам', text:'Слияние двух рек стало первым священным местом. Аттаи — отец. Аммаи — мать.'},
      {title:'Первые наскальные рисунки', text:'Функциональные карты миграций зверей у северного подножия Аттаи.'},

      {i:0, name:'Уллам', type:'Generic', exp:1.5, pop:5000, hex:'C4855A', origins:'—', locked:false, desc:'Праязык Корень. Аммаи-куттам. Вопрос — есть ли у тебя уллам?'},
    ]
  },
  {
    id: 'e80k', label: '-80 000', sublabel: 'Эпоха Расхождения',
    climate: {eq:'9°C', np:'-50°C', sp:'-50°C', prec:'88%'},
    images: [],
    dikari: 17000,
    events: [
      {title:'Ледник отступил', text:'На 300-400 км к северу. Три ветки от Уллам: Протоярви на север, Протоаларои на запад по берегу.'},
      {title:'Протоярви у ледника', text:'500-1000 чел. на 35-38°N. Лёд-брат, мамонт, звёзды. Язык уже другой.'},
      {title:'Протоаларои открыли море', text:'Первое слово вне Корня — Аала (море). Начало береговой оседлости.'},
    ],
    cultures: [
      {i:0, name:'Уллам', type:'Generic', exp:1.5, pop:70000, hex:'C4855A', origins:'—', locked:false, desc:'Три диалектные группы. Аммаи-куттам.'},
      {i:1, name:'Протоярви', type:'Hunting', exp:1.2, pop:750, hex:'8AAFC0', origins:'Уллам', locked:false, desc:'Северная ветка. У ледника 35-38°N.'},
      {i:2, name:'Протоаларои', type:'Naval', exp:2.0, pop:350, hex:'4A8C7A', origins:'Уллам', locked:false, desc:'Береговая ветка. Открыли море Аала.'},
    ]
  },
  {
    id: 'e60k', label: '-60 000', sublabel: 'Второе Похолодание',
    climate: {eq:'7°C', np:'-55°C', sp:'-55°C', prec:'80%'},
    images: [],
    dikari: 10000,
    events: [
      {title:'Ледник наступил', text:'Перевалы Аттаи закрыты. Уллам раскололись на четыре ветки. Восток недостижим.'},
      {title:'Раскол Уллам', text:'Аммаи остались у реки. Аруви ушли на юг. Вееру на запад. Де-Уллам в болота — официально мёртвые.'},
      {title:'Аала-Хаару', text:'Часть Хаару ушла к морю. Встреча с Аала — первый межрелигиозный диалог: лёд vs море.'},
    ],
    cultures: [
      {i:1, name:'Уллам ⚰', type:'Generic', exp:0, pop:0, hex:'C4855A', origins:'—', locked:true, desc:'Праматерь. Распалась на четыре ветки.'},
      {i:2, name:'Протоярви ⚰', type:'Hunting', exp:0, pop:0, hex:'8AAFC0', origins:'Уллам', locked:true, desc:'Распался на Хаару и Аала-Хаару.'},
      {i:3, name:'Протоаларои ⚰', type:'Naval', exp:0, pop:0, hex:'4A8C7A', origins:'Уллам', locked:true, desc:'Стал Аала.'},
      {i:4, name:'Аммаи', type:'River', exp:0.8, pop:15000, hex:'C4855A', origins:'Уллам', locked:false, desc:'Культ места. Первые постройки.'},
      {i:5, name:'Аруви', type:'River', exp:1.3, pop:20000, hex:'C8502A', origins:'Уллам', locked:false, desc:'Вера как навигация. Тропики.'},
      {i:6, name:'Вееру', type:'Nomadic', exp:2.0, pop:12000, hex:'A86030', origins:'Уллам', locked:false, desc:'Первые воины. Разведка перевалов.'},
      {i:7, name:'Де-Уллам', type:'Generic', exp:0.2, pop:3000, hex:'4A5A38', origins:'Уллам', locked:false, desc:'Живут в мире мёртвых. Болото.'},
      {i:8, name:'Хаару', type:'Hunting', exp:1.0, pop:500, hex:'8AAFC0', origins:'Протоярви', locked:false, desc:'У ледника. Культ выживания.'},
      {i:9, name:'Аала-Хаару', type:'Naval', exp:1.8, pop:150, hex:'6A9FB0', origins:'Протоярви', locked:false, desc:'У западного берега. Смешение с Аала.'},
      {i:10, name:'Аала', type:'Naval', exp:1.8, pop:600, hex:'3A8C78', origins:'Протоаларои', locked:false, desc:'Первая оседлость. Лодки.'},
    ]
  },
  {
    id: 'e40k', label: '-40 000', sublabel: 'Эпоха Оттепели',
    climate: {eq:'10°C', np:'-48°C', sp:'-37°C', prec:'85%'},
    images: [],
    dikari: 105000,
    events: [
      {title:'Аала-Хаару растворились', text:'Первое исчезновение культуры через ассимиляцию. Навыки (звёзды, морская охота) вошли в Аала.'},
      {title:'Хаару авангард на север', text:'Часть пошла за льдом. Раскол на две подгруппы. Тайга открылась.'},
      {title:'Обратная миграция Аруви', text:'Перенаселение ~95 000. Часть вернулась к Аммаи-куттам. Встреча через 20 000 лет.'},
      {title:'Аммаи-куттам — первое поселение', text:'500-1000 постоянных жителей. Первое разделение труда. Зачаток касты жрецов.'},
      {title:'Появились Каам', text:'Беглецы с юга. Другой язык, другой облик. Не знают уллам. Слабы, голодны, не нападают.'},
    ],
    cultures: [
      {i:1, name:'Уллам ⚰', type:'Generic', exp:0, pop:0, hex:'C4855A', origins:'—', locked:true, desc:'Праматерь всех культур.'},
      {i:2, name:'Протоярви ⚰', type:'Hunting', exp:0, pop:0, hex:'8AAFC0', origins:'Уллам', locked:true, desc:'Предок Хаару.'},
      {i:3, name:'Протоаларои ⚰', type:'Naval', exp:0, pop:0, hex:'4A8C7A', origins:'Уллам', locked:true, desc:'Предок Аала.'},
      {i:4, name:'Аала-Хаару ⚰', type:'Naval', exp:0, pop:0, hex:'6A9FB0', origins:'Протоярви', locked:true, desc:'Растворились в Аала.'},
      {i:5, name:'Аммаи', type:'River', exp:0.3, pop:25000, hex:'C4855A', origins:'Уллам', locked:false, desc:'Первое постоянное поселение. Разделение труда.'},
      {i:6, name:'Аруви', type:'River', exp:0.5, pop:20000, hex:'C8502A', origins:'Уллам', locked:false, desc:'Демографический пик. Обратная миграция. Религиозный раскол надвигается.'},
      {i:7, name:'Вееру', type:'Nomadic', exp:0.7, pop:9500, hex:'A86030', origins:'Уллам', locked:false, desc:'Территориальная концепция. У перевалов Аттаи.'},
      {i:8, name:'Де-Уллам', type:'Generic', exp:0.1, pop:540, hex:'4A5A38', origins:'Уллам', locked:false, desc:'Болотное железо. Тростниковые лодки.'},
      {i:9, name:'Хаару', type:'Hunting', exp:0.4, pop:700, hex:'8AAFC0', origins:'Протоярви', locked:false, desc:'Авангард на севере. Тайга.'},
      {i:10, name:'Аала', type:'Naval', exp:0.6, pop:11500, hex:'3A8C78', origins:'Протоаларои', locked:false, desc:'15 деревень. Звёздная навигация. Торговля.'},
      {i:11, name:'Каам', type:'Generic', exp:1.5, pop:4900, hex:'9A4030', origins:'null (Группа В)', locked:false, desc:'Беглецы с юга. Банту-язык. Не знают уллам.'},
    ]
  }
];

const TYPE_CLASS = {Generic:'generic',River:'river',Hunting:'hunting',Naval:'naval',Nomadic:'nomadic'};

let currentEpoch = 'e40k';

function renderEpochBar() {
  const bar = document.getElementById('epochBar');
  bar.innerHTML = EPOCHS.map(e => `
    <button class="epoch-btn ${e.id === currentEpoch ? 'active' : ''}"
      onclick="setEpoch('${e.id}')">
      ${e.label}<br><span style="font-size:9px;color:#666">${e.sublabel}</span>
    </button>
  `).join('');
}

function setEpoch(id) {
  currentEpoch = id;
  renderEpochBar();
  renderContent();
}

function expBar(val) {
  const pct = Math.min(val / 2.5 * 100, 100);
  return `<span class="exp-bar" style="width:40px"><span class="exp-fill" style="width:${pct}%"></span></span>${val}`;
}

function renderContent() {
  const epoch = EPOCHS.find(e => e.id === currentEpoch);
  const content = document.getElementById('content');

  const shumCulture = {pop: epoch.dikari || 0};
  const activeCultures = epoch.cultures.filter(c => !c.locked && !c.shum);
  const lockedCultures = epoch.cultures.filter(c => c.locked);
  const totalPop = activeCultures.reduce((s,c)=>s+c.pop,0);
  const shumPop = epoch.dikari || 0;

  content.innerHTML = `
    ${epoch.images && epoch.images.length > 0 ? `
    <div class="gallery">
      <div class="section-title">Карты и арты эпохи</div>
      <div class="gallery-strip">
        ${epoch.images.map((img,i) => `
          <div>
            <img class="gallery-img" src="${img.src}" alt="${img.caption||''}" onclick="openLightbox('${img.src}')" title="${img.caption||''}">
            <div class="gallery-caption">${img.caption||''}</div>
          </div>
        `).join('')}
        <div class="gallery-upload" onclick="uploadImg('${epoch.id}')" title="Добавить изображение">
          <span style="font-size:18px">+</span>
          <span>Добавить</span>
        </div>
      </div>
    </div>
    ` : `
    <div class="gallery">
      <div class="section-title">Карты и арты эпохи</div>
      <div class="gallery-strip">
        <div class="gallery-upload" onclick="uploadImg('${epoch.id}')" title="Добавить изображение">
          <span style="font-size:18px">+</span>
          <span>Добавить карту или арт</span>
        </div>
        <div class="gallery-empty" style="flex:1;min-width:300px;display:flex;align-items:center;justify-content:center">Нет изображений для этой эпохи</div>
      </div>
    </div>
    `}
    <div class="section-title">Климат</div>
    <div class="climate-grid">
      <div class="climate-card"><div class="label">Экватор</div><div class="value">${epoch.climate.eq}</div></div>
      <div class="climate-card"><div class="label">Северный полюс</div><div class="value">${epoch.climate.np}</div></div>
      <div class="climate-card"><div class="label">Южный полюс</div><div class="value">${epoch.climate.sp}</div></div>
      <div class="climate-card"><div class="label">Осадки</div><div class="value">${epoch.climate.prec}</div></div>
    </div>

    <div class="section-title">События эпохи</div>
    ${epoch.events.map(ev => `
      <div class="event-card">
        <h4>${ev.title}</h4>
        <p>${ev.text}</p>
      </div>
    `).join('')}

    <div class="section-title">Активные культуры — ${totalPop.toLocaleString()} чел. | Всего с Дикарями — <span class="pop">${(totalPop + (epoch.dikari||0)).toLocaleString()}</span> чел.</div>
    <table>
      <thead><tr>
        <th>Культура</th><th>Тип</th><th>Exp</th><th>Население</th>
        <th>HEX</th><th>Origins</th><th>Описание</th>
      </tr></thead>
      <tbody>
        ${activeCultures.map(c => `
          <tr>
            <td><span class="swatch" style="background:#${c.hex}"></span><b>${c.name}</b></td>
            <td><span class="tag tag-${TYPE_CLASS[c.type]||'generic'}">${c.type}</span></td>
            <td>${expBar(c.exp)}</td>
            <td class="pop">${c.pop.toLocaleString()}</td>
            <td style="font-family:monospace;font-size:9px;color:#666">#${c.hex}</td>
            <td style="color:#666;font-size:9px">${c.origins}</td>
            <td style="color:#888">${c.desc}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>

    ${lockedCultures.length ? `
      <div class="section-title">Залоченные (историческая память)</div>
      <table>
        <thead><tr><th>Культура</th><th>Тип</th><th>HEX</th><th>Origins</th><th>Описание</th></tr></thead>
        <tbody>
          ${lockedCultures.map(c => `
            <tr class="locked">
              <td><span class="swatch" style="background:#${c.hex};opacity:0.4"></span>${c.name}</td>
              <td><span class="tag tag-locked">${c.type}</span></td>
              <td style="font-family:monospace;font-size:9px;color:#444">#${c.hex}</td>
              <td style="color:#444;font-size:9px">${c.origins}</td>
              <td style="color:#444">${c.desc}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : ''}
  ${shumCulture ? `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 8px;background:#111;border:0.5px solid #2a2a28;border-radius:4px;margin-top:4px">
      <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#fff;opacity:0.3;flex-shrink:0"></span>
      <span style="color:#444;font-size:10px;flex:1"><b style="color:#666">Дикари</b> — неассимилировавшиеся полудикие, в статистику не включаются. Рассеяны по всему континенту группами по 10–15 человек. Живут везде, считаются никак.</span>
      <span style="color:#555;font-size:10px;font-family:monospace">${shumCulture.pop.toLocaleString()}</span>
    </div>
  ` : ''}
  `;
}

// Image storage (session only)
const epochImages = {e100k:[],e80k:[],e60k:[],e40k:[]};

function uploadImg(epochId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = e => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const caption = file.name.replace(/\.[^.]+$/, '');
        const epoch = EPOCHS.find(ep => ep.id === epochId);
        if (!epoch.images) epoch.images = [];
        epoch.images.push({src: ev.target.result, caption});
        if (currentEpoch === epochId) renderContent();
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lbImg').src = src;
  lb.classList.add('open');
}

renderEpochBar();
renderContent();
</script>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <span class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</span>
  <img id="lbImg" src="" alt="">
</div>
</body>
</html>
