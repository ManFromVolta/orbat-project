<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;background:#1a1a18;color:#d4d2cc;min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;background:#1a1a18;border-bottom:0.5px solid #333;padding:6px 16px;display:flex;align-items:center;gap:12px;z-index:1000}
.nav a{text-decoration:none;color:#888;font-size:10px;padding:3px 10px;border:0.5px solid #444;border-radius:3px;background:#2c2c2a}
.nav a:hover{color:#f1efe8;border-color:#888}
.spacer{height:36px}
.header{background:#2c2c2a;padding:14px 20px;border-bottom:1px solid #444}
.header h1{font-size:16px;font-weight:500;color:#f1efe8}
.header p{font-size:10px;color:#888;margin-top:3px}
.epoch-bar{display:flex;gap:6px;padding:10px 16px;background:#242422;border-bottom:1px solid #333;flex-wrap:wrap}
.epoch-btn{padding:6px 14px;border:0.5px solid #555;border-radius:4px;cursor:pointer;font-size:10px;background:#2c2c2a;color:#aaa;flex-shrink:0;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.epoch-btn.active{background:#5f5e5a;color:#f1efe8;border-color:#888}
.epoch-btn span{font-size:8px;color:#555}
.epoch-btn.active span{color:#aaa}
.content{padding:16px}
.summary-card{background:#242422;border:0.5px solid #444;border-left:3px solid #c87840;border-radius:4px;padding:12px 14px;margin-bottom:16px}
.summary-card p{font-size:11px;color:#aaa;line-height:1.7}
.section-title{font-size:10px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 8px}
.climate-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
@media(min-width:480px){.climate-grid{grid-template-columns:repeat(4,1fr)}}
.climate-card{background:#242422;border:0.5px solid #333;border-radius:4px;padding:8px 10px;text-align:center}
.climate-card .label{font-size:9px;color:#555;margin-bottom:2px}
.climate-card .value{font-size:13px;font-weight:500;color:#a0c880}
.event-card{background:#242422;border:0.5px solid #333;border-left:3px solid #c87840;border-radius:4px;padding:10px 12px;margin-bottom:8px}
.event-card h4{font-size:11px;font-weight:500;color:#f1efe8;margin-bottom:4px}
.event-card p{font-size:10px;color:#888;line-height:1.6}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px}
table{width:100%;border-collapse:collapse;min-width:460px}
th{background:#2c2c2a;padding:6px 8px;text-align:left;font-size:10px;font-weight:500;color:#666;border-bottom:1px solid #444;white-space:nowrap}
td{padding:6px 8px;border-bottom:0.5px solid #2a2a28;font-size:10px;vertical-align:top}
tr:hover td{background:#1e1e1c}
.swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;border:0.5px solid rgba(255,255,255,0.1)}
.locked td{color:#383838}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px}
.tag-nomadic{background:#3a2a10;color:#c87840}
.tag-river{background:#102a2a;color:#40a0a0}
.tag-hunting{background:#2a1a2a;color:#a060a0}
.tag-naval{background:#0a1a2a;color:#4080c0}
.tag-generic{background:#2a2a1a;color:#a0a060}
.tag-lake{background:#102030;color:#6090c0}
.tag-locked{background:#222;color:#444}
.pop{color:#a0c880}
.exp-bar{display:inline-block;width:36px;height:5px;background:#2c2c2a;border-radius:2px;vertical-align:middle;margin-right:4px;overflow:hidden}
.exp-fill{height:100%;border-radius:2px;background:#c87840}
.dikari-row{display:flex;align-items:center;gap:10px;padding:8px;background:#111;border:0.5px solid #2a2a28;border-radius:4px;margin-top:4px;flex-wrap:wrap}
</style>
</head>

  {name:'Аала',type:'Naval',exp:0.6,pop:11500,hex:'3A8C78',origins:'Протоаларои',locked:false,desc:'15 деревень. Звёздная навигация. Торговля.'},

const TC={Generic:'generic',River:'river',Hunting:'hunting',Naval:'naval',Nomadic:'nomadic',Lake:'lake'};
let cur='e20k';

function renderBar(){
  document.getElementById('epochBar').innerHTML=EPOCHS.map(e=>`
    <button class="epoch-btn ${e.id===cur?'active':''}" onclick="go('${e.id}')">
      ${e.label}<span>${e.sublabel}</span>
    </button>`).join('');
}
function go(id){cur=id;renderBar();render();}
function eb(v){const p=Math.min(v/2.5*100,100);return `<span class="exp-bar"><span class="exp-fill" style="width:${p}%"></span></span>${v}`;}

function render(){
  const ep=EPOCHS.find(e=>e.id===cur);
  const act=ep.cultures.filter(c=>!c.locked);
  const lck=ep.cultures.filter(c=>c.locked);
  const tot=act.reduce((s,c)=>s+c.pop,0);
  const dk=ep.dikari||0;
  document.getElementById('content').innerHTML=`
    <div class="summary-card"><p>${ep.summary}</p></div>
    <div class="section-title">Климат</div>
    <div class="climate-grid">
      <div class="climate-card"><div class="label">Экватор</div><div class="value">${ep.climate.eq}</div></div>
      <div class="climate-card"><div class="label">Сев. полюс</div><div class="value">${ep.climate.np}</div></div>
      <div class="climate-card"><div class="label">Юж. полюс</div><div class="value">${ep.climate.sp}</div></div>
      <div class="climate-card"><div class="label">Осадки</div><div class="value">${ep.climate.prec}</div></div>
    </div>
    <div class="section-title">События эпохи</div>
    ${ep.events.map(ev=>`<div class="event-card"><h4>${ev.title}</h4><p>${ev.text}</p></div>`).join('')}
    <div class="section-title">Активные культуры — ${tot.toLocaleString()} чел. | Всего с Дикарями — <span class="pop">${(tot+dk).toLocaleString()}</span> чел.</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Культура</th><th>Тип</th><th>Exp</th><th>Население</th><th>Origins</th><th>Описание</th></tr></thead>
      <tbody>${act.map(c=>`<tr>
        <td><span class="swatch" style="background:#${c.hex}"></span><b>${c.name}</b></td>
        <td><span class="tag tag-${TC[c.type]||'generic'}">${c.type}</span></td>
        <td>${eb(c.exp)}</td>
        <td class="pop">${c.pop.toLocaleString()}</td>
        <td style="color:#555;font-size:9px">${c.origins}</td>
        <td style="color:#777">${c.desc}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>
    ${lck.length?`<div class="section-title">Залоченные — историческая память</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Культура</th><th>HEX</th><th>Origins</th><th>Судьба</th></tr></thead>
      <tbody>${lck.map(c=>`<tr class="locked">
        <td><span class="swatch" style="background:#${c.hex};opacity:0.3"></span>${c.name}</td>
        <td style="font-family:monospace;font-size:9px;color:#333">#${c.hex}</td>
        <td style="color:#333;font-size:9px">${c.origins}</td>
        <td style="color:#333">${c.desc}</td>
      </tr>`).join('')}</tbody>
    </table></div>`:''}
    <div class="dikari-row">
      <span style="width:10px;height:10px;border-radius:2px;background:#ccc;opacity:0.2;flex-shrink:0;display:inline-block"></span>
      <span style="color:#444;font-size:10px;flex:1"><b style="color:#555">Дикари</b> — неассимилировавшиеся полудикие группы. В статистику не включаются. Везде по 10–15 человек.</span>
      <span style="color:#444;font-family:monospace">${dk.toLocaleString()}</span>
    </div>`;
}
renderBar();render();
</script>
</body>
</html>
