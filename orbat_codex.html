}
function go(id){cur=id;doEB();render();}
function xb(v){return '<span class="xb"><span class="xf" style="width:'+Math.min(v/2.5*100,100)+'%"></span></span>'+v;}
function render(){
  var ep=EP.find(function(e){return e.id===cur;});
  var act=ep.cu.filter(function(c){return !c.lk;});
  var lk=ep.cu.filter(function(c){return c.lk;});
  var tot=act.reduce(function(s,c){return s+c.p;},0);
  var dk=ep.dk||0;
  var rows=act.map(function(c){
    return '<tr><td><span class="sw" style="background:#'+c.h+'"></span><b>'+c.n+'</b></td>'
      +'<td><span class="tag '+TC[c.t]+'">'+c.t+'</span></td>'
      +'<td>'+xb(c.e)+'</td>'
      +'<td class="pop">'+c.p.toLocaleString()+'</td>'
      +'<td style="color:#777">'+c.o+'</td>'
      +'<td style="color:#999">'+c.d+'</td></tr>';
  }).join("");
  var lkrows=lk.map(function(c){
    return '<tr class="lk"><td><span class="sw" style="background:#'+c.h+';opacity:0.3"></span>'+c.n+'</td>'
      +'<td style="color:#555">'+c.o+'</td><td style="color:#555">'+c.d+'</td></tr>';
  }).join("");
  document.getElementById("cnt").innerHTML=
    '<div class="summary">'+ep.sum+'</div>'
    +'<div class="st">Климат</div>'
    +'<div class="climate">'
    +'<div class="cc"><div class="l">Экватор</div><div class="v">'+ep.cl.eq+'</div></div>'
    +'<div class="cc"><div class="l">Сев. полюс</div><div class="v">'+ep.cl.np+'</div></div>'
    +'<div class="cc"><div class="l">Юж. полюс</div><div class="v">'+ep.cl.sp+'</div></div>'
    +'<div class="cc"><div class="l">Осадки</div><div class="v">'+ep.cl.pr+'</div></div>'
    +'</div>'
    +'<div class="st">События эпохи</div>'
    +ep.ev.map(function(e){return '<div class="ev"><h4>'+e.t+'</h4><p>'+e.d+'</p></div>';}).join("")
    +'<div class="st">Активные — '+tot.toLocaleString()+' чел. | Всего с Дикарями — <span class="pop">'+(tot+dk).toLocaleString()+'</span> чел.</div>'
    +'<div class="tw"><table><thead><tr><th>Культура</th><th>Тип</th><th>Exp</th><th>Население</th><th>Origins</th><th>Описание</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +(lk.length?'<div class="st">Залоченные — историческая память</div><div class="tw"><table><thead><tr><th>Культура</th><th>Origins</th><th>Судьба</th></tr></thead><tbody>'+lkrows+'</tbody></table></div>':"")
    +'<div class="dk"><span style="width:10px;height:10px;border-radius:2px;background:#aaa;opacity:0.2;display:inline-block;flex-shrink:0"></span>'
    +'<span style="font-size:13px;color:#777;flex:1"><b style="color:#999">Дикари</b> — без культуры. В статистику не включаются. Рассеяны везде.</span>'
    +'<span style="font-size:13px;color:#666;font-family:monospace">'+dk.toLocaleString()+'</span></div>';
}
doEB();render();
</script>
</body>
</html>
