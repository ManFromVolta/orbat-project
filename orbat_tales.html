<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORBAT — Сказки</title>
<link rel="icon" href="favicon.ico">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#1a1a18;color:#d4d2cc;min-height:100vh;line-height:1.65}
.nav{position:fixed;top:0;left:0;right:0;background:#1a1a18;border-bottom:0.5px solid #333;padding:0 16px;display:flex;align-items:center;gap:10px;z-index:1000;height:52px}
.nav a{text-decoration:none;color:#999;font-size:13px;padding:0 14px;border:0.5px solid #3a3a38;border-radius:6px;background:#2a2a28;height:36px;display:flex;align-items:center;white-space:nowrap;transition:all 0.15s}
.nav a:hover{color:#f1efe8;border-color:#666}
.nav-title{color:#777;font-size:13px}
.spacer{height:52px}
.hdr{background:#202020;padding:18px 20px;border-bottom:0.5px solid #333}
.hdr h1{font-size:20px;font-weight:500;color:#f1efe8}
.hdr p{font-size:13px;color:#777;margin-top:5px}
.st{font-size:11px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:0.1em;margin:22px 0 12px;padding-bottom:6px;border-bottom:0.5px solid #282826}
.ev{background:#202020;border:0.5px solid #333;border-left:3px solid #c87840;border-radius:6px;padding:13px 15px;margin-bottom:10px}
.ev h4{font-size:14px;font-weight:600;color:#f1efe8;margin-bottom:5px}
.ev p{font-size:13px;color:#bbb;line-height:1.65;margin:0}
.nt{background:#202020;border-left:2px solid #3a3a38;padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;color:#999;line-height:1.65;margin:10px 0;font-style:italic}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px}
table{width:100%;border-collapse:collapse;min-width:380px;font-size:13px}
th{background:#282826;padding:9px 11px;text-align:left;font-size:12px;font-weight:600;color:#999;border-bottom:1px solid #333;white-space:nowrap}
td{padding:9px 11px;border-bottom:0.5px solid #282826;font-size:13px;color:#bbb;vertical-align:top}
tr:hover td{background:#202020}
.sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle;border:0.5px solid rgba(255,255,255,0.1)}
.pop{color:#a0c880}
.tag{display:inline-block;font-size:12px;padding:2px 7px;border-radius:3px}
.tn{background:#3a2a10;color:#c87840}
.tr{background:#0d2a2a;color:#3aa0a0}
.th{background:#22122a;color:#a060c0}
.tv{background:#081830;color:#3a80c0}
.tg{background:#22220d;color:#a0a040}
.tl{background:#0d2030;color:#5090c0}
.tk{background:#1a1a1a;color:#555}
p{font-size:14px;color:#bbb;line-height:1.75;margin-bottom:10px}


.ctrl{padding:12px 16px;background:#202020;border-bottom:0.5px solid #333;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fb{padding:8px 14px;border:0.5px solid #3a3a38;border-radius:6px;cursor:pointer;font-size:13px;background:#1a1a18;color:#888;min-height:40px;transition:all 0.15s}
.fb:hover{border-color:#666;color:#ccc}
.fb.on{color:#f1efe8;border-color:#666;background:#282826}
.shuf{margin-left:auto;padding:8px 16px;border:0.5px solid #c87840;border-radius:6px;cursor:pointer;font-size:13px;background:#1a1a18;color:#c87840;min-height:40px}
.shuf:hover{background:#202020}
.grid{display:grid;grid-template-columns:1fr}
@media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:920px){.grid{grid-template-columns:1fr 1fr 1fr}}
.card{display:none;padding:22px 20px;border-bottom:0.5px solid #1e1e1e;border-right:0.5px solid #1e1e1e;flex-direction:column;gap:10px}
.card.vis{display:flex}
.csw{width:10px;height:10px;border-radius:2px;flex-shrink:0;margin-top:3px}
.cp{font-size:13px;font-weight:600;color:#ccc}
.cd{font-size:12px;color:#666;margin-top:2px}
.ct{font-size:13px;font-weight:500;color:#888;font-style:italic;margin-top:3px}
.cb{font-size:14px;color:#bbb;line-height:1.85;font-style:italic}
.empty{padding:48px 20px;text-align:center;color:#555;font-size:14px;grid-column:1/-1}

</style>
</head>
<body>
<div class="nav"><a href="index.html">← Главная</a><span class="nav-title">Сказки народов Оррим</span></div>
<div class="spacer"></div>
<div class="hdr"><h1>Сказки народов Оррим</h1><p>Предания, легенды и бытовые истории · Устная традиция · Перевод условный</p></div>
<div class="ctrl" id="ctrl"></div>
<div class="grid" id="grid"></div>
<script>
var TALES=[{"people": "Аммаи", "hex": "C4855A", "date": "ок. 40 000 до н.э.", "title": "О том почему река поворачивает", "text": "Аммаи шла прямо. Всегда шла прямо. Потом увидела Аттаи и испугалась. Повернула. Мы живём там где она повернула. Мы живём в её испуге. Поэтому здесь хорошо — испуг это не плохо. Испуг это когда видишь что-то очень большое."}, {"people": "Аммаи", "hex": "C4855A", "date": "ок. 35 000 до н.э.", "title": "О зерне которое вернулось", "text": "Мы бросили зерно в землю. Забыли. Пришли обратно — оно выросло. Мы ничего не делали. Оно само. Старый Муттааи сказал — зерно помнит откуда пришло. Мы спросили — откуда оно пришло. Он сказал — из земли. Мы спросили — как оно туда попало. Он долго молчал. Потом сказал — не знаю. Спроси у зерна."}, {"people": "Аммаи", "hex": "C4855A", "date": "ок. 20 000 до н.э.", "title": "О том кто хранит", "text": "Муттааи не охотится. Не рыбачит. Не строит. Мы его кормим. Нас спрашивают — зачем кормить того кто не работает. Мы говорим — он помнит. Нас спрашивают — что помнит. Мы говорим — всё что было до нас. Нас спрашивают — зачем это нужно. Мы не отвечаем. Некоторые вещи нужны просто потому что нужны."}, {"people": "Де-Уллам", "hex": "4A5A38", "date": "ок. 46 000 до н.э.", "title": "О болотном огне", "text": "Однажды огонь вышел из воды. Не из дерева. Из воды. Мы сидели и он вышел. Никто не принёс его. Никто не ушёл с ним. Он был и потом не был. Бабушка сказала — это дед. Мы спросили — какой дед. Она сказала — все деды сразу."}, {"people": "Де-Уллам", "hex": "4A5A38", "date": "ок. 30 000 до н.э.", "title": "О том как слушать мёртвых", "text": "Отец лежит в воде третий год. Мы приходим говорить с ним. Он не отвечает словами. Но вода вокруг него иногда движется. Иногда нет. Мы научились понимать. Движется — да. Не движется — нет. В прошлом году спросили идти ли на север за тростником. Вода не двигалась. Мы не пошли. Потом узнали — там были чужие. Отец знал."}, {"people": "Де-Уллам", "hex": "4A5A38", "date": "ок. 20 000 до н.э.", "title": "О камне из болота", "text": "Дядя бил камнем по рыжей грязи у тела прадеда. Так делают всегда. Потом взял то что получилось. Оно было твёрдое и острое. Не как камень. Другое. Он показал всем. Все смотрели. Никто не знал что это. Положили к прадеду обратно. Пусть он знает что это. Он старше."}, {"people": "Тенгир", "hex": "C8A040", "date": "ок. 18 000 до н.э.", "title": "О горах которые не подпускают", "text": "Он шёл три дня. На третий день горы не стали ближе. Он понял что горы не хотят чтобы к ним подходили. Он лёг и посмотрел на небо. Небо было то же самое что над степью. Тогда он понял — горы это когда небо упирается в землю. Он вернулся и рассказал. Больше туда не ходили."}, {"people": "Тенгир", "hex": "C8A040", "date": "ок. 15 000 до н.э.", "title": "О старике и воде", "text": "Старик Коолтас три дня смотрел на север. Мы спрашивали — что там. Он говорил — тише. На четвёртый день встал и пошёл. Мы пошли за ним. Через два дня пути нашли воду. Рыба там непуганая, бралась руками. Когда спросили как он знал — сказал: небо темнело там иначе. Влага. Вода всегда меняет небо над собой если умеешь смотреть."}, {"people": "Тенгир", "hex": "C8A040", "date": "ок. 12 000 до н.э.", "title": "О том кто остановился", "text": "Один из наших сел и не встал. Сказал — я устал идти. Мы ждали день. Он не встал. Мы ждали ещё день. Он не встал. На третий день мы пошли без него. Небо над ним осталось то же. Небо над нами менялось каждый день. Мы живы. Он жив. Но он больше не видит нового неба."}, {"people": "Ярви", "hex": "6A9FB0", "date": "ок. 19 000 до н.э.", "title": "О том как нашли озеро", "text": "Деды шли за льдом. Лёд уходил. Деды шли. Потом лёд перестал уходить. Деды остановились и увидели воду. Вода была большая и тихая. Один человек спросил воду кто она. Вода не ответила. Он вошёл в воду по колено. Вода была холодная. Он сказал — она знает меня. Холодная значит знает. Тёплая значит не знает. Мы остались."}, {"people": "Ярви", "hex": "6A9FB0", "date": "ок. 17 000 до н.э.", "title": "О зиме озера", "text": "Когда озеро замерзает мы не говорим что оно спит. Оно не спит. Оно думает. Летом оно шумит — волны, рыба, ветер. Некогда думать. Зимой тихо. Лёд держит мысль. Поэтому всё важное мы решаем зимой — у берега, на льду, когда озеро думает вместе с нами."}, {"people": "Ярви", "hex": "6A9FB0", "date": "ок. 10 000 до н.э.", "title": "О лебеде", "text": "Лебедь живёт на озере. Мы не трогаем лебедя. Деды говорили — лебедь был здесь раньше нас. Значит озеро его а не наше. Мы здесь в гостях. Хороший гость не трогает хозяина. Один раз молодой убил лебедя. Той зимой рыбы не было. Мы ели кору. Совпадение или нет — не знаем. Больше не трогаем."}, {"people": "Аалои", "hex": "3A8C78", "date": "ок. 51 000 до н.э.", "title": "О первой лодке", "text": "Дерево упало в воду и не утонуло. Человек смотрел долго. Потом сел на дерево. Дерево его держало. Он сидел и думал что дерево хочет. Дерево хотело идти. Куда ветер. Человек не хотел куда ветер. Они не договорились. Человек слез. Но запомнил что дерево держит."}, {"people": "Аалои", "hex": "3A8C78", "date": "ок. 20 000 до н.э.", "title": "О торговом споре", "text": "Нерикос из северной деревни привёз смолу. Хотел рыбу. Мы дали рыбу — столько сколько дают за смолу. Он сказал мало. Мы сказали — в прошлый раз смола была суше. Эта тяжёлая, в ней вода. Он взял рыбу и ушёл недовольный. На следующий год привёз сухую смолу. Мы дали больше. Так договор стал лучше без слов."}, {"people": "Аалои", "hex": "3A8C78", "date": "ок. 10 000 до н.э.", "title": "О море ночью", "text": "Ночью море становится другим. Днём оно наше. Ночью оно своё. Мы выходим ночью только когда очень нужно. Когда выходим — не смотрим за борт. Там видно звёзды снизу. Это не наши звёзды. Те что снизу — для других. Для кого — не знаем. Но они там есть."}, {"people": "Хаджар", "hex": "4A6080", "date": "ок. 20 000 до н.э.", "title": "О первой ночи без берега", "text": "Берег ушёл. Мы гребли и берег ушёл. Старый Дьёрвиз сказал грести. Мы гребли. Ночью звёзды пришли. Дьёрвиз посмотрел на звёзды и сказал куда грести. Утром берег пришёл обратно. Другой берег. Не тот что ушёл. Дьёрвиз сказал — берег один. Просто большой."}, {"people": "Хаджар", "hex": "4A6080", "date": "ок. 18 000 до н.э.", "title": "О реке", "text": "Первое что говорят детям на воде — река всегда права. Потому что она уже здесь тысячу лет и знает куда идёт. Ты здесь первый год. Когда мой сын тащил лодку против течения я сказал — иди на двадцать шагов левее. Там глубже. Он спросил откуда я знаю. Я сказал — вода сказала. Он не понял. Через десять лет поймёт."}, {"people": "Хаджар", "hex": "4A6080", "date": "ок. 10 000 до н.э.", "title": "О барабане в шторм", "text": "В шторм страшно. Все знают. Но барабан не останавливается. Добош говорит — пока звук есть мы есть. Однажды барабанщик упал. Барабан замолчал. Мы все замолчали тоже. Потом старик Чёндвиз взял барабан и ударил. Один раз. Мы выдохнули. Потом ещё раз. Выгребли."}, {"people": "Маккал", "hex": "A83020", "date": "ок. 20 000 до н.э.", "title": "О границе", "text": "Мы не ставим камни на границе. Камень можно убрать. Мы закапываем кости. Первый Маккал который умер на этой земле лежит здесь — мы знаем где. Чужой не знает. Когда чужой говорит — эта земля ничья, мы говорим — ничья? Здесь лежит Паттан сын Маккалана. Спроси у него чья. Обычно после этого уходят."}, {"people": "Маккал", "hex": "A83020", "date": "ок. 15 000 до н.э.", "title": "О воине который вернулся", "text": "Он ушёл один. Вернулся через десять дней. Худой. Молчал три дня. Потом сказал — там за холмами живут люди. Мы спросили — сколько их. Он сказал — не знаю. Я не считал. Я смотрел как они сидят у огня. Мы спросили — и что. Он сказал — они тоже сидят у огня. Как мы. Это важно знать."}, {"people": "Мараи", "hex": "7A5030", "date": "ок. 20 000 до н.э.", "title": "О первых словах", "text": "Они стояли и смотрели. Мы стояли и смотрели. Они были цвета сухой земли. Мы были цвета мокрой земли. Один из них что-то сказал. Мы не поняли. Наш старик поднял руку вверх. Они подняли руки вверх. Мы не знали что это значит для них. Они не знали что это значит для нас. Но мы оба подняли руки. Значит что-то одно."}, {"people": "Мараи", "hex": "7A5030", "date": "ок. 15 000 до н.э.", "title": "О двух богах", "text": "Наша мать говорит Аммаи-мать. Их мать говорит Мунгу. Мы спорили чья мать больше. Долго спорили. Потом дождь пошёл. Мы все промокли одинаково. Старики замолчали. Наверное обе матери послали дождь. Или одна. Или это просто дождь. Не знаем. Дерево было большое."}, {"people": "Каам", "hex": "9A4030", "date": "ок. 42 000 до н.э.", "title": "О пустыне которая ела", "text": "Раньше там был лес. Деды говорили. Потом лес стал меньше. Потом трава. Потом песок. Песок не кормит. Мы ушли. Нашли людей цвета сухой земли. Никто не ударил. Они дали рыбу. Мы дали что было. Больше ничего не было. Но рыба была."}, {"people": "Каам", "hex": "9A4030", "date": "ок. 30 000 до н.э.", "title": "О барабане который помнит", "text": "Барабан старше меня. Старше отца. Старше деда деда. Дерево другое. Кожа другая. Но барабан тот же. Мы спрашивали старика почему тот же если всё другое. Он сказал — звук тот же. Звук не меняли. Пока звук тот же — барабан тот же. Мы не совсем поняли. Но когда бьём — понимаем."}, {"people": "Велды", "hex": "6B7A3A", "date": "ок. 20 000 до н.э.", "title": "О первом звере который остался", "text": "Зверь был ранен. Мы могли убить. Не убили. Принесли домой. Лечили. Он остался. Ел из рук. Потом умер сам — старый был. Мы похоронили его как своего. Закопали у дома. Сосед смеялся — зачем хоронить зверя. Мы не ответили. Просто казалось правильным. Он жил с нами. Значит наш."}, {"people": "Велды", "hex": "6B7A3A", "date": "ок. 15 000 до н.э.", "title": "О земле которая помнит", "text": "Дед умер. Мы закопали его на нашем поле. Теперь его кости в земле. Земля знает его. Когда сажаем зерно — оно растёт в той земле что знает деда. Мы едим зерно. Мы знаем деда через зерно. Сосед говорит это не так работает. Мы говорим — а ты откуда знаешь как работает."}];
var PEOPLES=[...new Set(TALES.map(function(t){return t.people;}))].sort();
var HEX={};
TALES.forEach(function(t){HEX[t.people]=t.hex;});
var active=new Set(PEOPLES);
var order=TALES.map(function(_,i){return i;});
function renderCtrl(){
  var c=document.getElementById("ctrl");
  var h="";
  PEOPLES.forEach(function(p){
    var on=active.has(p);
    h+='<button class="fb'+(on?" on":"")+'" data-p="'+p+'"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#'+HEX[p]+';opacity:'+(on?1:0.4)+';margin-right:6px;vertical-align:middle"></span>'+p+'</button>';
  });
  h+='<button class="shuf" onclick="shuffle()">Перемешать</button>';
  c.innerHTML=h;
  c.querySelectorAll(".fb").forEach(function(b){
    b.addEventListener("click",function(){
      var p=this.dataset.p;
      if(active.has(p)){if(active.size>1)active.delete(p);}else active.add(p);
      renderCtrl();renderGrid();
    });
  });
}
function shuffle(){
  for(var i=order.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=order[i];order[i]=order[j];order[j]=tmp;
  }
  renderGrid();
}
function renderGrid(){
  var g=document.getElementById("grid");
  var vis=order.filter(function(i){return active.has(TALES[i].people);});
  if(!vis.length){g.innerHTML='<div class="empty">Нет историй</div>';return;}
  g.innerHTML=vis.map(function(i){
    var t=TALES[i];
    return '<div class="card vis"><div style="display:flex;align-items:flex-start;gap:8px"><span class="csw" style="background:#'+t.hex+'"></span><div><div class="cp">'+t.people+'</div><div class="cd">'+t.date+'</div><div class="ct">'+t.title+'</div></div></div><div class="cb">'+t.text+'</div></div>';
  }).join("");
}
renderCtrl();renderGrid();
</script>
</body>
</html>
