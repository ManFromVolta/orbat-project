<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBAT — Таймлайн</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0f0f17; color: #d1d5db; }
        .accent { color: #c4855a; }
        .card { background: #1a1a24; border: 1px solid #374151; }
    </style>
</head>
<body class="p-8 max-w-5xl mx-auto">

    <a href="index.html" class="text-[#c4855a] hover:underline mb-8 inline-block">← Главная</a>

    <h1 class="text-4xl font-bold mb-10">Таймлайн проекта</h1>

    <div class="space-y-8">
        <div class="card p-8">
            <div class="flex justify-between">
                <span class="text-2xl accent">01</span>
                <span class="text-emerald-400">-100 000 … -80 000</span>
            </div>
            <h2 class="text-xl mt-4">Ледниковый максимум • Приход Уллам</h2>
            <p class="text-sm text-zinc-400 mt-4">Первые ~10 000 человек через перешеек. Культ предков. Прото-Уллам.</p>
        </div>

        <div class="card p-8 opacity-60">
            <div class="flex justify-between">
                <span class="text-2xl">02</span>
                <span>-80 000 … -60 000</span>
            </div>
            <h2 class="text-xl mt-4">Медленное потепление • Расселение</h2>
            <p class="text-sm text-zinc-500 mt-4">В разработке...</p>
        </div>

        <!-- Остальные итерации аналогично серые -->
        <div class="text-center text-xs text-zinc-600 mt-12">
            Итерации 3–9 — в работе
        </div>
    </div>

    <footer class="mt-16 text-center text-xs text-zinc-600">
        ORBAT Worldbuilding Project · 2026
    </footer>
</body>
</html>
