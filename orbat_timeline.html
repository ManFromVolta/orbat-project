<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORBAT — Таймлайн</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;background:#1a1a18;color:#d4d2cc;min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;background:#1a1a18;border-bottom:0.5px solid #333;padding:0 16px;display:flex;align-items:center;gap:12px;z-index:1000;height:48px}
.nav a{text-decoration:none;color:#888;font-size:13px;padding:6px 12px;border:0.5px solid #444;border-radius:5px;background:#2c2c2a;min-height:48px;display:flex;align-items:center}
.nav a:hover{color:#f1efe8;border-color:#888}
.spacer{height:48px}
.header{background:#2c2c2a;padding:14px 20px;border-bottom:1px solid #444}
.header h1{font-size:19px;font-weight:500;color:#f1efe8}
.header p{font-size:13px;color:#999;margin-top:4px}
.wrap{padding:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.inner{min-width:700px}
.axis{height:40px;position:relative;border-bottom:1px solid #2a2a28;margin-bottom:4px}
.rows{position:relative}
.row{display:flex;align-items:center;border-bottom:0.5px solid #1e1e1c;min-height:34px}
.rl{width:130px;min-width:130px;font-size:12px;color:#aaa;padding:4px 10px 4px 0;text-align:right;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:5px}
.dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}
.rt{flex:1;position:relative;height:34px}
.bar{position:absolute;top:9px;height:16px;border-radius:3px;cursor:pointer;opacity:0.8;transition:opacity 0.1s}
.bar:hover{opacity:1;z-index:5}
.bar-lbl{position:absolute;inset:0;display:flex;align-items:center;padding:0 6px;font-size:8px;color:rgba(255,255,255,0.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evt{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;border:2px solid #1a1a18;cursor:pointer;z-index:6;display:flex;align-items:center;justify-content:center}
.evt-inner{width:6px;height:6px;border-radius:50%;background:#1a1a18}
.tt{position:fixed;background:#2c2c2a;border:0.5px solid #555;border-radius:4px;padding:8px 10px;font-size:10px;pointer-events:none;z-index:200;max-width:200px;display:none;line-height:1.5;color:#d4d2cc}
.tt h4{color:#f1efe8;margin-bottom:3px;font-size:11px}
.footnote{margin-top:14px;padding-top:10px;border-top:0.5px solid #2a2a28;font-size:12px;color:#888;line-height:1.6}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:10px 0;margin-top:6px}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:#888}
.li-dot{width:10px;height:10px;border-radius:2px}
</style>
</head>
<body>
<div class="nav">
  <a href="index.html">← Главная</a>
  <span style="color:#777;font-size:10px">Таймлайн</span>
</div>
<div class="spacer"></div>
<div class="header">
  <h1>ORBAT — Таймлайн эпох</h1>
  <p>Эволюция народов от первых людей до 1952 н.э.</p>
</div>
<div class="wrap">
  <div class="inner">
    <div class="axis" id="axis"></div>
    <div class="rows" id="rows"></div>
    <div class="legend" id="legend"></div>
    <div class="footnote">* Дикари не отображаются — неорганизованные полудикие группы без культуры, рассеяны по континенту на протяжении всей истории. В -20 000 до н.э. составляют ~315 000 из ~500 000 человек.</div>
  </div>
</div>
<div class="tt" id="tt"></div>
<script>
const ERAS=[
  {y:-100000,l:"-100k",s:"Доисторич.",cur:false},
  {y:-80000, l:"-80k", s:"Расхожд.", cur:false},
  {y:-60000, l:"-60k", s:"Похолод.", cur:false},
  {y:-40000, l:"-40k", s:"Оттепель", cur:false},
  {y:-20000, l:"-20k", s:"Основания",cur:true},
  {y:-10000, l:"-10k", s:"Неолит",   cur:false},
  {y:-3000,  l:"-3k",  s:"Бронза",   cur:false},
  {y:0,      l:"0",    s:"н.э.",     cur:false},
  {y:1952,   l:"1952", s:"Игровое",  cur:false}
];

const PEOPLES=[
  {name:"Уллам",      dead:true, hex:"C4855A",start:-100000,end:-60000,
   desc:"Праматерь всех культур. Язык Корень.",
   events:[{y:-100000,l:"Аммаи-куттам"},{y:-80000,l:"Рост до 80 000"}]},
  {name:"Протоярви",  dead:true, hex:"8AAFC0",start:-95000, end:-60000,
   desc:"Откол на север. Ледник.",events:[]},
  {name:"Протоаларои",dead:true, hex:"3A8C78",start:-80000, end:-60000,
   desc:"Береговой путь. Открыли море.",
   events:[{y:-80000,l:"Открыли море"}]},
  {name:"Аммаи",      dead:false,hex:"C4855A",start:-60000, end:null,
   desc:"Хранители Аммаи-куттам. Первый город.",
   events:[{y:-40000,l:"Первое поселение"},{y:-20000,l:"Первый город"}]},
  {name:"Аруви",      dead:true, hex:"C8502A",start:-60000, end:-20000,
   desc:"Набожные южные. Распались в -20 000.",
   events:[{y:-40000,l:"Пик 95 000"},{y:-20000,l:"Распад"}]},
  {name:"Вееру",      dead:true, hex:"A86030",start:-60000, end:-20000,
   desc:"Кочевники. Первые воины. Стали Тенгир.",
   events:[{y:-20000,l:"Прошли Аттаи"}]},
  {name:"Де-Уллам",   dead:false,hex:"4A5A38",start:-60000, end:null,
   desc:"Мёртвые в болотах. Изолят.",
   events:[{y:-20000,l:"Первая игла"}]},
  {name:"Хаару",      dead:true, hex:"8AAFC0",start:-60000, end:-20000,
   desc:"Охотники у ледника. Стали Ярви.",
   events:[{y:-20000,l:"Стали Ярви"}]},
  {name:"Аала-Хаару", dead:true, hex:"6A9FB0",start:-60000, end:-40000,
   desc:"Растворились в Аала.",
   events:[{y:-40000,l:"Ассимиляция"}]},
  {name:"Аала/Аалои", dead:false,hex:"3A8C78",start:-60000, end:null,
   desc:"Морской народ. Аркос.",
   events:[{y:-40000,l:"15 деревень"},{y:-20000,l:"Аркос"}]},
  {name:"Каам",       dead:false,hex:"9A4030",start:-42000, end:null,
   desc:"Группа В. Беглецы с юга.",
   events:[{y:-42000,l:"Первый контакт"}]},
  {name:"Ярви",       dead:false,hex:"6A9FB0",start:-20000, end:null,
   desc:"Потомки Хаару. Священное озеро.",
   events:[{y:-20000,l:"Яарви-ранта"}]},
  {name:"Тенгир",     dead:false,hex:"C8A040",start:-20000, end:null,
   desc:"Потомки Вееру. Восточные равнины.",
   events:[{y:-20000,l:"За Аттаи"}]},
  {name:"Велды",      dead:false,hex:"6B7A3A",start:-20000, end:null,
   desc:"Хаару + Вееру. Протославяне.",events:[]},
  {name:"Маккал",     dead:false,hex:"A83020",start:-20000, end:null,
   desc:"Военная фракция Аруви.",events:[]},
  {name:"Мараи",      dead:false,hex:"7A5030",start:-20000, end:null,
   desc:"Аруви + Каам. Синкретический народ.",events:[]},
  {name:"Хаджар",     dead:false,hex:"4A6080",start:-20000, end:null,
   desc:"Группа Б. Народ флотилии.",
   events:[{y:-20000,l:"Высадка в дельте"}]}
];

const MIN=-105000, MAX=2100, RNG=MAX-MIN;
function pct(y){return ((y-MIN)/RNG)*100;}

function render(){
  const axis=document.getElementById("axis");
  const rows=document.getElementById("rows");
  const legend=document.getElementById("legend");

  // Axis ticks
  var ah="";
  ERAS.forEach(function(e){
    var p=pct(e.y);
    var col=e.cur?"#c87840":"#2a2a28";
    var tc=e.cur?"#c87840":"#444";
    var sc=e.cur?"#886020":"#333";
    ah+='<div style="position:absolute;top:0;bottom:0;left:'+p+'%;width:1px;background:'+col+'"></div>';
    ah+='<div style="position:absolute;top:4px;left:'+p+'%;transform:translateX(-50%);text-align:center;font-size:8px;color:'+tc+';white-space:nowrap">'+e.l+'<br><span style="font-size:7px;color:'+sc+'">'+e.s+'</span></div>';
  });
  axis.innerHTML=ah;

  // Current line behind rows
  var curPct=pct(-20000);

  var rh='<div style="position:absolute;top:0;bottom:0;left:'+curPct+'%;width:1px;background:rgba(200,120,64,0.2);pointer-events:none"></div>';

  PEOPLES.forEach(function(p){
    var sp=pct(p.start);
    var ep=p.end?pct(p.end):pct(1952);
    var wp=ep-sp;
    var op=p.dead?0.3:0.75;
    var nameClean=p.name;

    var evts="";
    p.events.forEach(function(ev){
      var ep2=pct(ev.y);
      evts+='<div class="evt" style="left:'+ep2+'%;background:#'+p.hex+';opacity:'+(p.dead?0.4:1)+'" data-label="'+ev.l+'" onmouseenter="st(event,this.dataset.label)" onmouseleave="ht()" ontouchstart="st(event,this.dataset.label)" ontouchend="ht()"><div class="evt-inner"></div></div>';
    });

    var suffix=p.dead?" ⚰":"";
    rh+='<div class="row">';
    rh+='<div class="rl"><span class="dot" style="background:#'+p.hex+';opacity:'+(p.dead?0.3:1)+'"></span><span style="color:'+(p.dead?"#444":"#888")+'">'+nameClean+suffix+'</span></div>';
    rh+='<div class="rt">';
    rh+='<div class="bar" style="left:'+sp+'%;width:'+wp+'%;background:#'+p.hex+';opacity:'+op+'" data-name="'+nameClean+'" data-desc="'+p.desc+'" onmouseenter="sf(event,this.dataset.name,this.dataset.desc)" onmouseleave="ht()">';
    rh+='<div class="bar-lbl">'+(wp>5?nameClean:"")+'</div></div>';
    rh+=evts;
    rh+='</div></div>';
  });

  rows.innerHTML=rh;

  // Legend — unique hex
  var seen={};
  var lh="";
  PEOPLES.forEach(function(p){
    if(!seen[p.hex]){
      seen[p.hex]=true;
      lh+='<div class="li"><div class="li-dot" style="background:#'+p.hex+';opacity:'+(p.dead?0.4:1)+'"></div><span>'+p.name+(p.dead?" ⚰":"")+'</span></div>';
    }
  });
  legend.innerHTML=lh;
}

function st(e,label){
  var t=document.getElementById("tt");
  t.innerHTML="<h4>"+label+"</h4>";
  t.style.display="block";
  var x=e.touches?e.touches[0].clientX:e.clientX;
  var y=e.touches?e.touches[0].clientY:e.clientY;
  t.style.left=Math.min(x+12,window.innerWidth-210)+"px";
  t.style.top=Math.max(y-40,4)+"px";
}

function sf(e,name,desc){
  var t=document.getElementById("tt");
  t.innerHTML="<h4>"+name+"</h4><p>"+desc+"</p>";
  t.style.display="block";
  var x=e.touches?e.touches[0].clientX:e.clientX;
  var y=e.touches?e.touches[0].clientY:e.clientY;
  t.style.left=Math.min(x+12,window.innerWidth-210)+"px";
  t.style.top=Math.max(y-40,4)+"px";
}

function ht(){document.getElementById("tt").style.display="none";}
document.addEventListener("click",ht);
render();
</script>
</body>
</html>
