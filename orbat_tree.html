<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORBAT — Дерево народов</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;background:#1a1a18;color:#d4d2cc;min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;background:#1a1a18;border-bottom:0.5px solid #333;padding:0 16px;display:flex;align-items:center;gap:12px;z-index:1000;height:48px}
.nav a{text-decoration:none;color:#888;font-size:13px;padding:6px 12px;border:0.5px solid #444;border-radius:5px;background:#2c2c2a;min-height:48px;display:flex;align-items:center}
.nav a:hover{color:#f1efe8;border-color:#888}
.spacer{height:48px}
.header{background:#2c2c2a;padding:14px 20px;border-bottom:1px solid #444}
.header h1{font-size:19px;font-weight:500;color:#f1efe8}
.header p{font-size:13px;color:#999;margin-top:4px}
.layout{display:flex;min-height:calc(100vh - 80px);flex-direction:column}
@media(min-width:640px){.layout{flex-direction:row}}
.tree-wrap{flex:1;overflow:auto;padding:16px;min-height:300px}
.detail{width:100%;background:#1e1e1c;border-top:0.5px solid #2a2a28;padding:16px}
@media(min-width:640px){.detail{width:260px;min-width:260px;border-top:none;border-left:0.5px solid #2a2a28;overflow-y:auto}}
.detail-empty{color:#777;font-size:11px;padding:20px 0;text-align:center}
.detail h2{font-size:13px;font-weight:500;color:#f1efe8;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sw{width:12px;height:12px;border-radius:2px;flex-shrink:0;border:0.5px solid rgba(255,255,255,0.1)}
.dl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin:10px 0 2px}
.dv{font-size:10px;color:#bbb;line-height:1.5}
.dead{font-size:9px;padding:2px 6px;background:#1a1a18;border:0.5px dashed #333;color:#888;border-radius:2px}
svg{display:block}
.node{cursor:pointer}
.node rect{transition:opacity 0.1s}
.node:hover rect{opacity:1!important}
.node text{pointer-events:none;font-family:Arial,sans-serif}
.edge{fill:none;stroke:#333;stroke-width:1}
.edge-dead{stroke:#2a2a28;stroke-dasharray:4,3}
</style>
</head>
<body>
<div class="nav">
  <a href="index.html">← Главная</a>
  <span style="color:#777;font-size:10px">Дерево народов</span>
</div>
<div class="spacer"></div>
<div class="header">
  <h1>ORBAT — Дерево народов</h1>
  <p>Origins · Языковые семьи · Нажми на узел</p>
</div>
<div class="layout">
  <div class="tree-wrap"><svg id="treeSvg"></svg></div>
  <div class="detail" id="detail">
    <div class="detail-empty">Нажми на народ</div>
  </div>
</div>

<script>
// Nodes: id, label, hex, year, dead, x_col, y_row, desc, lang, pop, type
const NODES=[
  {id:'ullam',   label:'Уллам',        hex:'C4855A',year:'-100 000',dead:true, col:4, row:0, type:'Generic',pop:'—',
   desc:'Праматерь всех народов континента. Главный вопрос: «Есть ли у тебя уллам?»',
   lang:'Корень — агглютинативный, ретрофлексные тт/дд/нн/лл, долгие гласные, SOV'},
  {id:'proyarvi',label:'Протоярви',    hex:'8AAFC0',year:'-95 000',dead:true, col:2, row:1, type:'Hunting',pop:'—',
   desc:'Откол на север вслед за льдом. Предок Хаару и Аала-Хаару.',
   lang:'Корень северный: ретрофлексные исчезли, гармония гласных начинается'},
  {id:'proalaroi',label:'Протоаларои', hex:'3A8C78',year:'-80 000',dead:true, col:6, row:1, type:'Naval',pop:'—',
   desc:'Береговой путь на запад. Открыли море. Первое слово вне Корня — Аала.',
   lang:'Корень береговой: дифтонги аи/ои начинаются, первая морская лексика'},
  {id:'haaru',   label:'Хаару',        hex:'8AAFC0',year:'-60 000',dead:true, col:1, row:2, type:'Hunting',pop:'—',
   desc:'Охотники у ледника. Культ льда-брата. Загонная охота на мамонтов.',
   lang:'Протоярви развитый: гармония гласных, нг/мн, Хаару/Луми/Пеура'},
  {id:'aalahaaru',label:'Аала-Хаару',  hex:'6A9FB0',year:'-60 000',dead:true, col:3, row:2, type:'Naval',pop:'—',
   desc:'Растворились в Аала (-40 000). Первая морская охота. Звёздная навигация.',
   lang:'Протоярви + морская Аала: смешение двух систем'},
  {id:'ammai',   label:'Аммаи',        hex:'C4855A',year:'-60 000',dead:false,col:4, row:2, type:'River',pop:'71 000',
   desc:'Хранители Аммаи-куттам. Первый город. Наследственный Муттааи. Зернохранилище.',
   lang:'Корень чистый + оседлая лексика: Вилл, Куттал, Толил, Уримаи'},
  {id:'aruvi',   label:'Аруви',        hex:'C8502A',year:'-60 000',dead:true, col:5, row:2, type:'River',pop:'—',
   desc:'Набожные южные. Вера как навигация. Распались в -20 000 на три народа.',
   lang:'Корень южный + тропическая лексика: Пазам, Пулли, Каду, Виттай'},
  {id:'veeru',   label:'Вееру',        hex:'A86030',year:'-60 000',dead:true, col:6, row:2, type:'Nomadic',pop:'—',
   desc:'Западные кочевники. Первые воины. Прошли Аттаи и стали Тенгир.',
   lang:'Корень + заимствования Хаару: Хаарру, Тиинг, Эллаи, Талайвар'},
  {id:'deullam', label:'Де-Уллам',     hex:'4A5A38',year:'-60 000',dead:false,col:7, row:2, type:'Generic',pop:'11 000',
   desc:'Мёртвые в болотах. Болотные мумии-оракулы. Первая игла из железа (-20 000).',
   lang:'Корень изолят: носовые цепочки, Нааннаи, Маннааннам'},
  {id:'aala',    label:'Аала / Аалои', hex:'3A8C78',year:'-60 000',dead:false,col:5, row:3, type:'Naval',pop:'17 000',
   desc:'Морской народ. 15 деревень. Аркос — первый торговый узел. Числительные.',
   lang:'Корень морской: дифтонги аи/ои, -ос/-ас суффиксы, Нерос/Лимнос/Аала'},
  {id:'kaam',    label:'Каам',         hex:'9A4030',year:'-42 000',dead:false,col:8, row:3, type:'Generic',pop:'12 000',
   desc:'Группа В с юга. Тёмнокожие. Не знают уллам. Банту-язык.',
   lang:'Банту: классы Ба-/Му-/Ки-, тональность, назальные мб/нд/нг'},
  {id:'yarvi',   label:'Ярви',         hex:'6A9FB0',year:'-20 000',dead:false,col:1, row:3, type:'Lake',pop:'7 000',
   desc:'Потомки Хаару. Нашли священное озеро Яарви. Яарви-ранта. Жрецы воды.',
   lang:'Финский тип завершён: гармония гласных, нг/мн, озёрная лексика'},
  {id:'veldy',   label:'Велды',        hex:'6B7A3A',year:'-20 000',dead:false,col:2, row:3, type:'River',pop:'6 000',
   desc:'Хаару + Вееру. Протославяне. Первое скотоводство. Право на землю.',
   lang:'Смешение Корня + финского + степного. Падежная система зарождается'},
  {id:'tengir',  label:'Тенгир',       hex:'C8A040',year:'-20 000',dead:false,col:6, row:3, type:'Nomadic',pop:'14 000',
   desc:'Потомки Вееру. Восточные равнины. Тенгри — небо. Тенгиркол.',
   lang:'Тюркский тип: Сарыташ, Каракол, Тенгир, кочевая степная лексика'},
  {id:'makkal',  label:'Маккал',       hex:'A83020',year:'-20 000',dead:false,col:4, row:3, type:'Nomadic',pop:'19 000',
   desc:'Военная фракция Аруви. Держат территорию. Первые воины Корня.',
   lang:'Корень военный: Маккал, Порран, Эллаи, Тилан, Чолан'},
  {id:'marai',   label:'Мараи',        hex:'7A5030',year:'-20 000',dead:false,col:5, row:4, type:'Generic',pop:'22 000',
   desc:'Аруви + Каам. Первый синкретический народ. Пиджин-язык. Двубожие.',
   lang:'Пиджин Корень + Банту: Мараи, Симани, Нгомани, Аруни'},
  {id:'hadjar',  label:'Хаджар',       hex:'4A6080',year:'-20 000',dead:false,col:9, row:3, type:'Naval',pop:'5 000',
   desc:'Группа Б. Народ флотилии. Обогнули мир. В дельте западной реки.',
   lang:'Венгерский тип: гармония гласных, дь/нь/ч/ш, суффиксы вместо предлогов'},
];

const EDGES=[
  {f:'ullam',  t:'proyarvi'}, {f:'ullam',t:'proalaroi'},
  {f:'ullam',  t:'ammai'},   {f:'ullam',t:'aruvi'},
  {f:'ullam',  t:'veeru'},   {f:'ullam',t:'deullam'},
  {f:'proyarvi',t:'haaru'},  {f:'proyarvi',t:'aalahaaru'},
  {f:'proalaroi',t:'aala'},
  {f:'aalahaaru',t:'aala',dashed:true},
  {f:'haaru',  t:'yarvi'},   {f:'haaru',t:'veldy'},
  {f:'veeru',  t:'tengir'},  {f:'veeru',t:'veldy',dashed:true},
  {f:'aruvi',  t:'makkal'},  {f:'aruvi',t:'marai',dashed:true},
  {f:'kaam',   t:'marai',dashed:true},
];

// Layout
const CW=90, RH=64, PAD=20;
const COLS=10, ROWS=5;
const SVG_W=COLS*CW+PAD*2;
const SVG_H=ROWS*RH+PAD*2;
const NW=80, NH=24;

function nx(col){return PAD+col*CW+CW/2;}
function ny(row){return PAD+row*RH+RH/2;}

function renderTree(){
  const svg=document.getElementById('treeSvg');
  svg.setAttribute('width',SVG_W);
  svg.setAttribute('height',SVG_H);
  svg.setAttribute('viewBox',`0 0 ${SVG_W} ${SVG_H}`);

  let html='';

  // Edges
  EDGES.forEach(e=>{
    const fn=NODES.find(n=>n.id===e.f);
    const tn=NODES.find(n=>n.id===e.t);
    if(!fn||!tn)return;
    const x1=nx(fn.col),y1=ny(fn.row)+NH/2;
    const x2=nx(tn.col),y2=ny(tn.row)-NH/2;
    const my=(y1+y2)/2;
    const cls=e.dashed?'edge edge-dead':'edge';
    html+=`<path class="${cls}" d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"/>`;
  });

  // Nodes
  NODES.forEach(n=>{
    const x=nx(n.col)-NW/2, y=ny(n.row)-NH/2;
    const hex=n.hex;
    const r=parseInt(hex.substring(0,2),16);
    const g=parseInt(hex.substring(2,4),16);
    const b=parseInt(hex.substring(4,6),16);
    const bright=(r*299+g*587+b*114)/1000;
    const tc=bright<128?'#e8e8e8':'#1a1a18';
    const op=n.dead?0.35:0.85;

    html+=`<g class="node" onclick="showDetail('${n.id}')">
      <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="3"
        fill="#${hex}" opacity="${op}"
        stroke="${n.dead?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.12)'}" stroke-width="0.5"/>
      <text x="${nx(n.col)}" y="${ny(n.row)}" text-anchor="middle" dominant-baseline="middle"
        font-size="9" fill="${tc}" opacity="${n.dead?0.6:1}">${n.label}${n.dead?' ⚰':''}</text>
    </g>`;
  });

  svg.innerHTML=html;
}

function showDetail(id){
  const n=NODES.find(x=>x.id===id);
  if(!n)return;
  const d=document.getElementById('detail');
  if(n.id==='dikari'){
    d.innerHTML=`<h2><span class="sw" style="background:#555"></span>Дикари</h2>
      <div class="dl">Статус</div><div class="dv" style="color:#888">Фоновое население. Нередактируемо. Везде и нигде.</div>
      <div class="dl">Язык</div><div class="dv" style="color:#888">Сигнальная система. ~200 корней. 1 слог = 1 понятие.</div>`;
    return;
  }
  const origins=EDGES.filter(e=>e.t===id).map(e=>{
    const fn=NODES.find(x=>x.id===e.f);
    return fn?fn.label:'?';
  }).join(', ')||'— (прародитель)';

  d.innerHTML=`
    <h2><span class="sw" style="background:#${n.hex};opacity:${n.dead?0.4:1}"></span>${n.label}${n.dead?` <span class="dead">⚰ ист.</span>`:''}</h2>
    <div style="font-size:9px;color:#888;margin-bottom:10px">${n.year} до н.э. · ${n.type}</div>
    <div class="dl">Описание</div><div class="dv">${n.desc}</div>
    <div class="dl">Язык</div><div class="dv" style="color:#6a9fb0">${n.lang}</div>
    <div class="dl">Население</div><div class="dv" style="color:#a0c880">${n.pop}</div>
    <div class="dl">Origins</div><div class="dv" style="color:#888">${origins}</div>
    ${n.dead?'<div style="margin-top:10px;padding:6px 8px;background:#111;border:0.5px solid #2a2a28;border-radius:3px;font-size:9px;color:#888">Залочена. Территория убрана. Сохранена для дерева Origins.</div>':''}
  `;
}

renderTree();
</script>
</body>
</html>
