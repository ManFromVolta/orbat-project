<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORBAT — Народы</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a18;--bg2:#202020;--bg3:#282826;--bg4:#111110;
  --border:#2e2e2c;--border2:#252523;
  --text:#d4d2cc;--text2:#b0aea8;--text3:#777;--text4:#444;
  --accent:#c87840;--radius:5px;--nav:52px;--maxw:860px;
}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:'Spectral',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
.nav{position:fixed;top:0;left:0;right:0;background:var(--bg);border-bottom:0.5px solid var(--border);
  padding:0 20px;display:flex;align-items:center;gap:4px;z-index:1000;height:var(--nav)}
.nav-logo{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:#f1efe8;
  letter-spacing:0.12em;padding:0 14px 0 0;margin-right:8px;border-right:0.5px solid var(--border);
  text-decoration:none;white-space:nowrap}
.nav a:not(.nav-logo){text-decoration:none;color:var(--text3);font-family:'JetBrains Mono',monospace;
  font-size:12px;padding:0 12px;height:34px;display:flex;align-items:center;border-radius:var(--radius);
  white-space:nowrap;transition:color 0.15s,background 0.15s;letter-spacing:0.04em}
.nav a:not(.nav-logo):hover{color:#f1efe8;background:var(--bg3)}
.nav a.active{color:var(--accent) !important}
.nav-eng{margin-left:auto}
.nav-eng a{border:0.5px solid var(--border) !important;background:var(--bg2) !important}
.spacer{height:var(--nav)}
.hdr{padding:18px 20px 0;border-bottom:0.5px solid var(--border2)}
.hdr-inner{max-width:var(--maxw);margin:0 auto}
.hdr h1{font-size:17px;font-weight:400;color:#f1efe8;padding-bottom:14px}
.epoch-bar{border-bottom:0.5px solid var(--border2);background:var(--bg2)}
.epoch-bar-inner{max-width:var(--maxw);margin:0 auto;padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap}
.eb{padding:6px 14px;border:0.5px solid var(--border);border-radius:var(--radius);
  cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);
  color:var(--text3);flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  gap:1px;transition:all 0.15s;min-height:40px;justify-content:center}
.eb:hover{border-color:#555;color:var(--text)}
.eb.on{background:var(--bg3);color:#f1efe8;border-color:#555}
.eb span{font-size:10px;color:var(--text4)}
.eb.on span{color:#888}
.content{padding:20px;max-width:var(--maxw);margin:0 auto}
.st{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--text4);
  text-transform:uppercase;letter-spacing:0.14em;margin:22px 0 10px;padding-bottom:6px;
  border-bottom:0.5px solid var(--border2)}
.st:first-child{margin-top:0}

/* PEOPLE CARD */
.people-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px}
.people-card.dead{opacity:0.4}
.people-card.dead .people-img-wrap{filter:grayscale(1)}
.dead-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:0.1em;color:#555;border:0.5px solid #2a2a28;background:var(--bg4);
  padding:2px 8px;border-radius:3px;margin-bottom:10px;text-transform:uppercase}
.people-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.people-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;border:0.5px solid rgba(255,255,255,0.1)}
.people-name{font-size:17px;font-weight:400;color:#f1efe8}
.people-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-left:auto;text-align:right;line-height:1.5}
.people-img-wrap{background:#111;border-radius:var(--radius);overflow:hidden;cursor:pointer;
  width:90px;height:90px;flex-shrink:0;position:relative}
.people-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;transition:opacity 0.15s}
.people-img-wrap img.loaded{display:block}
.people-img-wrap:hover img.loaded{opacity:0.85}
.people-img-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:absolute;inset:0;gap:4px;color:var(--text4);font-family:'JetBrains Mono',monospace;
  font-size:8px;text-align:center;padding:6px}
.people-img-ph.hidden{display:none}
.people-img-ph-icon{font-size:18px;opacity:0.15}
.people-desc{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:14px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
@media(min-width:480px){.stat-row{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:9px 11px}
.stat .l{font-size:10px;color:var(--text3);margin-bottom:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;text-transform:uppercase}
.stat .v{font-size:13px;color:var(--text);font-family:'JetBrains Mono',monospace}
.lang-section{margin-top:12px}
.lang-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text4);
  text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px}
.lang-note{font-size:12px;color:var(--text4);font-style:italic;margin-top:6px;margin-bottom:10px;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;line-height:1.6}
.lang-table{width:100%;border-collapse:collapse;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif}
.lang-table th{background:var(--bg3);padding:7px 10px;text-align:left;font-size:10px;
  font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap}
.lang-table td{padding:7px 10px;border-bottom:0.5px solid var(--border2);color:var(--text2);vertical-align:top}
.lang-table tr:last-child td{border-bottom:none}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
@media(min-width:480px){.vocab-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:720px){.vocab-grid{grid-template-columns:repeat(4,1fr)}}
.vocab-item{background:var(--bg3);border:0.5px solid var(--border2);border-radius:3px;
  padding:6px 10px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.vocab-word{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}
.vocab-gloss{font-size:11px;color:var(--text3)}
.wildlands{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;opacity:0.4}
.wildlands-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.wildlands-name{font-size:15px;color:var(--text3);font-style:italic}
.wildlands-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text4);margin-left:auto}
.wildlands-desc{font-size:13px;color:var(--text3);line-height:1.7;font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);
  z-index:2000;align-items:center;justify-content:center;cursor:pointer;padding:24px}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius)}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);z-index:1000}
.mob-nav-inner{display:flex}
.mob-nav a{flex:1;text-decoration:none;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:9px 4px 11px;gap:3px;font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--text3);transition:color 0.15s;min-height:54px}
.mob-nav a.active{color:var(--accent)}
@media(max-width:600px){
  .nav a:not(.nav-logo){display:none}.nav-eng{display:none}
  .mob-nav{display:block}body{padding-bottom:54px}
  .content{padding:16px}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">ORBAT</a>
  <a href="world.html">Мир</a>
  <a href="peoples.html" class="active">Народы</a>
  <a href="artifacts.html">Артефакты</a>
  <div class="nav-eng"><a href="orbat_engine.html">⚙ Движок</a></div>
</nav>
<div class="spacer"></div>
<div class="hdr"><div class="hdr-inner"><h1>Народы</h1></div></div>

<div class="epoch-bar">
  <div class="epoch-bar-inner">
    <button class="eb" data-era="e100k">−100 000<span>Эра Первых</span></button>
    <button class="eb" data-era="e80k">−80 000<span>Расхождение</span></button>
    <button class="eb on" data-era="e60k">−60 000<span>Эра Мёртвых</span></button>
  </div>
</div>

<div class="content" id="peoples-content"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a href="index.html"><span>◎</span>Главная</a>
    <a href="world.html"><span>🌍</span>Мир</a>
    <a href="peoples.html" class="active"><span>👥</span>Народы</a>
    <a href="artifacts.html"><span>🏺</span>Артефакты</a>
    <a href="orbat_engine.html"><span>⚙</span>Движок</a>
  </div>
</nav>

<script>
// ── HELPERS ──────────────────────────────────────────────────────────────────
function imgWrap(file) {
  return '<div class="people-img-wrap">'
    + '<img src="artifacts/'+file+'"'
    + ' onload="this.classList.add(\'loaded\');this.nextElementSibling.classList.add(\'hidden\')"'
    + ' onerror="this.style.display=\'none\'">'
    + '<div class="people-img-ph"><div class="people-img-ph-icon">👤</div></div>'
    + '</div>';
}

function header(img, color, name, meta) {
  return '<div class="people-header">'
    + imgWrap(img)
    + '<div style="flex:1">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
    + '<div class="people-swatch" style="background:'+color+'"></div>'
    + '<div class="people-name">'+name+'</div>'
    + '</div>'
    + '<div class="people-meta" style="text-align:left;margin-left:0">'+meta+'</div>'
    + '</div></div>';
}

function card(opts) {
  var dead = opts.dead || false;
  var cls = 'people-card' + (dead ? ' dead' : '');
  var deadBadge = dead ? '<div class="dead-badge">⚰ '+opts.deadLabel+'</div>' : '';
  return '<div class="'+cls+'">'
    + deadBadge
    + header(opts.img, opts.color, opts.name + (dead ? ' ⚰' : ''), opts.meta)
    + '<div class="people-desc">'+opts.desc+'</div>'
    + (opts.stats || '')
    + (opts.lang || '')
    + '</div>';
}

function stats(pop, type, origin, territory) {
  return '<div class="stat-row">'
    + '<div class="stat"><div class="l">Население</div><div class="v">'+pop+'</div></div>'
    + '<div class="stat"><div class="l">Тип</div><div class="v">'+type+'</div></div>'
    + '<div class="stat"><div class="l">Происхождение</div><div class="v">'+origin+'</div></div>'
    + '<div class="stat"><div class="l">Территория</div><div class="v">'+territory+'</div></div>'
    + '</div>';
}

function vocabGrid(words) {
  return '<div class="vocab-grid">'
    + words.map(function(w){
        return '<div class="vocab-item"><span class="vocab-word">'+w[0]+'</span><span class="vocab-gloss">'+w[1]+'</span></div>';
      }).join('')
    + '</div>';
}

// ── DATA ─────────────────────────────────────────────────────────────────────

var VOCAB_ULLAM = [
  ['*улам','человек, свой'],['*алла','земля, почва'],['*атта','отец, старший'],
  ['*амма','мать, старшая'],['*тии','огонь'],['*каан','вода, река'],
  ['*анна','небо'],['*мир','зверь, дичь'],['*кала','камень, орудие'],
  ['*тала','дерево, лес'],['*сула','путь, движение'],['*нула','холод, лёд'],
  ['*вира','сила, жизнь'],['*пали','место стоянки'],['*рани','женщина'],
  ['*кани','ребёнок'],['*тума','смерть'],['*саан','солнце'],
  ['*миин','рыба'],['*куур','гора'],['*еел','птица']
];

var VOCAB_AALA = [
  ['*аала','море'],['*миил','волна'],['*кааре','берег, бухта'],
  ['*тула','плот, лодка'],['*санни','прибой'],['*вираан','прилив'],
  ['*налу','глубина, дно'],['*пеела','морская птица'],
  ['*тиисан','туман'],['*каарун','скала у воды']
];

var LANG_ULLAM = '<div class="lang-section">'
  + '<div class="lang-title">Язык Уллам (реконструкция 1952)</div>'
  + '<div class="lang-note">Праязык. Реконструкция лингвистов 1952 года — как праиндоевропейский для нас. Никто живой на нём не говорит.</div>'
  + '<table class="lang-table">'
  + '<tr><th>Категория</th><th>Звуки</th></tr>'
  + '<tr><td>Краткие гласные</td><td>а е и у</td></tr>'
  + '<tr><td>Долгие гласные</td><td>аа ее ии уу</td></tr>'
  + '<tr><td>Ларингалы</td><td>Х₁ нейтральный · Х₂ велярный · Х₃ лабиовелярный</td></tr>'
  + '<tr><td>Ретрофлексные</td><td>тт нн лл — архаичная черта</td></tr>'
  + '<tr><td>Структура слога</td><td>CV · CVV · CVC — без скоплений</td></tr>'
  + '<tr><td>Порядок слов</td><td>SOV</td></tr>'
  + '</table>'
  + '<div class="st">Краткий словарь</div>'
  + vocabGrid(VOCAB_ULLAM)
  + '</div>';

var LANG_AALA = '<div class="lang-section">'
  + '<div class="lang-title">Язык — дрейф от языка Уллам</div>'
  + '<div class="lang-note">Ретрофлексные тт/нн/лл исчезли. Х₃ даёт о — первое о в ветви. Будущий тип: западная ветвь → эллинский.</div>'
  + '<div class="st">Новые слова</div>'
  + vocabGrid(VOCAB_AALA)
  + '</div>';


var LANG_BOLOTNYYE = '<div class="lang-section">'
  + '<div class="lang-title">Язык — архаичный изолят</div>'
  + '<div class="lang-note">Самый консервативный из всех потомков языка Уллам. Ретрофлексные тт/нн/лл сохранились — у всех остальных исчезают. Ритуальный консерватизм запрещает менять язык мёртвых. Будущий тип — изолят.</div>'
  + '</div>';

var WILDLANDS = '<div class="st">Фоновое население</div>'
  + '<div class="wildlands">'
  + '<div class="wildlands-header">'
  + '<div class="people-swatch" style="background:#888;opacity:0.4"></div>'
  + '<div class="wildlands-name">Дикари (Wildlands)</div>'
  + '<div class="wildlands-meta">~791 · неуправляемы</div>'
  + '</div>'
  + '<div class="wildlands-desc">Неандертальцы и денисовцы. Рассеяны по всему континенту, ~200 изолированных групп. Сигнальные системы, не язык. Будут уничтожены или ассимилированы потомками Уллам.</div>'
  + '</div>';

var ERAS = {
  e100k: {
    label: "Эра Первых Людей · −100 000",
    count: "1 культура · ~700 чел.",
    render: function() {
      return card({
        img: 'people_ullam.png', color: '#C4855A',
        name: 'Уллам', meta: 'Generic · ~700 чел. · Expansion 0.1',
        desc: 'Единственная культура на континенте. Пришли с юга через юго-восточный перешеек — откуда именно и почему неизвестно, это останется загадкой в лоре. Европейский тип внешности. Вопрос «есть ли у тебя уллам?» — первый и главный критерий человека.',
        stats: stats('~700', 'Generic', 'неизвестно', 'юг, 140 кл.'),
        lang: LANG_ULLAM
      }) + WILDLANDS;
    }
  },

  e60k: {
    label: "Эра Мёртвых · −60 000",
    count: "3 культуры · ~10 000 чел.",
    render: function() {
      return card({
        img: 'people_ullam_60k.png', color: '#C4855A',
        name: 'Уллам', meta: 'Generic · ~8 000 чел. · Expansion 0.1',
        desc: 'Ядро. Номинально единый народ, фактически несколько слабо связанных родовых групп. Ритуал слияния огней *тии-куттам* ещё держит единство — но это уже скорее традиция чем живая практика.',
        stats: stats('~8 000', 'Generic', 'неизвестно', 'юг, центр'),
        lang: LANG_ULLAM
      })
      + card({
        img: 'people_beregovye_60k.png', color: '#4A8C7A',
        name: 'Аала', meta: 'Naval · ~1 500 чел. · Expansion 2.0',
        desc: 'Береговые Уллам, окончательно оформились как отдельная культура. Самоназвание Аала — морские люди. Первые полноценные лодки для каботажа вдоль берега. Контакт с ядром утрачен.',
        stats: stats('~1 500', 'Naval', 'Уллам', 'зап. берег'),
        lang: LANG_AALA
      })
      + card({
        img: 'people_bolotnyye.png', color: '#4A5A38',
        name: 'Болотные Уллам', meta: 'Generic · ~400 чел. · Expansion 0.1',
        desc: 'Откол ок. −60 000. Ядро Уллам провело по ним похоронный обряд — они ушли в болота как мёртвые. Приняли это и построили вокруг этого всю культуру. Самоназвание *Тумаллам — в разработке. Старейший мёртвый важнее любого живого.',
        stats: stats('~400', 'Изолят', 'Уллам', 'вост. болота'),
        lang: LANG_BOLOTNYYE
      })
      + WILDLANDS;
    }
  },
  e80k: {
    label: "Эра Расхождения · −80 000",
    count: "2 культуры · ~4 000 чел.",
    render: function() {
      return card({
        img: 'people_ullam.png', color: '#C4855A',
        name: 'Уллам', meta: 'Generic · ~3 000 чел. · Expansion 0.1',
        desc: 'Ядро. Несколько родовых общин которые встречаются сезонно. Ритуал слияния огней *тии-куттам* держит номинальное единство.',
        stats: stats('~3 000', 'Generic', 'неизвестно', 'юг, центр'),
        lang: LANG_ULLAM
      })
      + card({
        img: 'people_beregovye.png', color: '#4A8C7A',
        name: 'Береговые Уллам', meta: 'Naval · ~800 чел. · Expansion 2.0',
        desc: 'Откол от Уллам ок. −80 000. Западное побережье, движутся на запад вдоль берега. Самоназвание Аала — морские люди. Первые примитивные лодки.',
        stats: stats('~800', 'Naval', 'Уллам', 'зап. берег'),
        lang: LANG_AALA
      })
      + WILDLANDS;
    }
  }
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function setEra(era) {
  document.querySelectorAll('.eb').forEach(function(b){
    b.classList.toggle('on', b.dataset.era === era);
  });
  document.getElementById('peoples-content').innerHTML = ERAS[era].render();
  bindLightbox();
}

function bindLightbox() {
  document.querySelectorAll('.people-img-wrap').forEach(function(w){
    w.addEventListener('click', function(){
      var img = w.querySelector('img.loaded');
      if (!img) return;
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox').classList.add('on');
      document.body.style.overflow = 'hidden';
    });
  });
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('on');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLightbox(); });

document.querySelectorAll('.eb').forEach(function(b){
  b.addEventListener('click', function(){ setEra(b.dataset.era); });
});

setEra('e60k');
</script>
</body>
</html>
